name: neurobridge_mobile
description: "NeuroBridge mobile app (patient and family/caregiver)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Routing
  go_router: ^14.6.0
  # HTTP client
  dio: ^5.7.0
  # Secure token storage
  flutter_secure_storage: ^9.2.2
  # Image selection (gallery) for Memory Album uploads (mobile + web)
  image_picker: ^1.1.2
  # Internationalization utilities
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
