# Alembic configuration for the NeuroBridge backend.
#
# NOTE: the database URL is intentionally NOT set here. It is provided at runtime
# by alembic/env.py from application settings (DATABASE_URL), so no credentials
# are stored in this file.

[alembic]
script_location = alembic
prepend_sys_path = .
# Use OS path separators; keeps version file paths portable.
version_path_separator = os

# Populated dynamically in alembic/env.py — leave blank.
sqlalchemy.url =


# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
